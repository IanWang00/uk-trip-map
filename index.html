  app.appendChild(tab);

  // Map - only render active page

  } else {
    var um=makeMap('uk',UK_ROUTES,isLondon?null:activeId);
    mapWrap.appendChild(um);
  }
  app.appendChild(mapWrap);

  // Route card
  if(activeId){
    var route=ROUTES.find(function(r){return r.id===activeId;});
    if(route){var card=makeRouteCard(route);app.appendChild(card);}
  }

  // Add pin button
  var curKey=page===0?'london':'uk';
  var isAdding=addingPin&&addingPin.key===curKey;
  var ab=el('button',
    'width:100%;padding:8px;border-radius:10px;border:1.5px solid '+(isAdding?'#e74c3c':'#d4c8b0')+
    ';background:'+(isAdding?'#e74c3c':'#fffdf7')+';color:'+(isAdding?'#fff':'#7a6a5a')+
    ';font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px',
    isAdding?'🎯 点击地图放置标记（再点取消）':'📍 在地图上添加自定义标记');
  ab.onclick=function(){addingPin=isAdding?null:{key:curKey};render();};
  app.appendChild(ab);

  // Pin list
  var curPins=customPins.filter(function(p){return p.key===curKey;});
  if(curPins.length>0){
    var pc=div('background:#fffdf7;border-radius:12px;border:1px solid #d4c8b0;padding:10px 12px;margin-top:6px');
    pc.appendChild(div('font-size:11px;font-weight:700;color:#7a6a5a;margin-bottom:6px','📍 我的标记'));
    curPins.forEach(function(pin){
      var pd=visited.has('pin_'+pin.id);
      var pr=div('display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;margin-bottom:4px;border-left:3px solid '+pin.color+';background:'+(pd?pin.color+'15':'#f5f0e8'));
      var pn=div('width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid '+pin.color+';background:'+(pd?pin.color:'transparent')+';color:'+(pd?'#fff':pin.color)+';cursor:pointer;min-width:22px',pd?'✓':'○');
      var pi=div('flex:1;min-width:0');
      pi.innerHTML='<div style="font-size:12px;font-weight:600;color:#1a0a00;text-decoration:'+(pd?'line-through':'none')+'">'+pin.label+'</div>'+
        (pin.note?'<div style="font-size:10px;color:#7a6a5a">'+pin.note+'</div>':'')+
        '<div style="font-size:10px;background:'+pin.color+'18;color:'+pin.color+';display:inline-block;padding:1px 6px;border-radius:4px;margin-top:2px">'+pin.tag+'</div>';
      var eb=el('button','padding:3px 8px;border-radius:6px;border:1px solid #d4c8b0;background:transparent;color:#7a6a5a;font-size:10px;cursor:pointer;font-family:inherit','编辑');
      var db=el('button','padding:3px 8px;border-radius:6px;border:1px solid #fcc;background:transparent;color:#e74c3c;font-size:10px;cursor:pointer;font-family:inherit','删除');
      (function(pid){
        pn.onclick=function(){toggleVisit('pin_'+pid);};
        eb.onclick=function(){editingPin=editingPin===pid?null:pid;render();};
        db.onclick=function(){customPins=customPins.filter(function(p){return p.id!==pid;});visited.delete('pin_'+pid);saveState();render();};
      })(pin.id);
      pr.appendChild(pn);pr.appendChild(pi);pr.appendChild(eb);pr.appendChild(db);
      pc.appendChild(pr);
    });
    app.appendChild(pc);
  }

  // Pin modal
  if(editingPin!==null){
    var epin=customPins.find(function(p){return p.id===editingPin;});
    if(epin)app.appendChild(makePinModal(epin));
  }
}

function routeBtn(r){
  var active=activeId===r.id;
  var allDone=r.stops.length>0&&r.stops.every(function(s){return visited.has(s.id);});
  var bg=active?r.color:(allDone?r.color:'transparent');
  var col=(active||allDone)?'#fff':r.color;
  var label=(allDone&&!active)?'✓ '+r.label:r.label;
  var b=el('button','padding:4px 10px;border-radius:99px;border:1.5px solid '+r.color+';background:'+bg+';color:'+col+';font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s',label);
  b.onclick=function(){
    activeId=activeId===r.id?null:r.id;
    activeSid=null;
    if(activeId)page=LONDON_IDS.has(r.id)?0:1;
    render();
  };
  return b;
}

function makeMap(key,routes,activeRouteId){
  var wrap=div('position:relative;touch-action:none;user-select:none;cursor:grab');
  var inner=div('position:relative;transform-origin:top left');
  inner.id='inner-'+key;
  applyTEl(inner,transforms[key]);

  var img=document.createElement('img');
  img.src=key==='london'?LONDON_IMG:UK_IMG;
  img.style.cssText='width:100%;display:block;pointer-events:none;-webkit-user-drag:none';
  img.onload=function(){imgSizes[key]={w:img.offsetWidth,h:img.offsetHeight};drawSVG(key,routes,activeRouteId);};
  inner.appendChild(img);

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id='svg-'+key;
  svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible';
  svg.setAttribute('viewBox','0 0 '+imgSizes[key].w+' '+imgSizes[key].h);
  svg.setAttribute('preserveAspectRatio','none');
  inner.appendChild(svg);
  wrap.appendChild(inner);
  setTimeout(function(){drawSVG(key,routes,activeRouteId);},50);

  // Click to add pin
  inner.addEventListener('click',function(e){
    if(!addingPin||addingPin.key!==key)return;
    var rect=inner.getBoundingClientRect();
    var t=transforms[key];
    var px=Math.round((e.clientX-rect.left)/t.scale/img.offsetWidth*100);
    var py=Math.round((e.clientY-rect.top)/t.scale/img.offsetHeight*100);
    addingPin=null;
    var np={id:nextPinId++,key:key,px:clamp(px,1,99),py:clamp(py,1,99),label:'新标记',tag:'想去',color:'#e74c3c',note:''};
    customPins.push(np);editingPin=np.id;saveState();render();
  });

  wrap.addEventListener('mousedown',function(e){if(!addingPin)startDrag(e.clientX,e.clientY,key,wrap);});
  wrap.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY,key,wrap);});
  wrap.addEventListener('mouseup',endDrag);
  wrap.addEventListener('mouseleave',endDrag);
  wrap.addEventListener('wheel',function(e){
    e.preventDefault();
    transforms[key].scale=clamp(transforms[key].scale*(e.deltaY<0?1.15:0.87),1,5);
    applyT(key);
    setTimeout(function(){drawSVG(key,routes,activeRouteId);},30);
  },{passive:false});
  wrap.addEventListener('touchstart',function(e){
    if(addingPin&&addingPin.key===key){
      e.preventDefault();
      var rect=inner.getBoundingClientRect();var t=transforms[key];
      var px=Math.round((e.touches[0].clientX-rect.left)/t.scale/img.offsetWidth*100);
      var py=Math.round((e.touches[0].clientY-rect.top)/t.scale/img.offsetHeight*100);
      addingPin=null;
      var np={id:nextPinId++,key:key,px:clamp(px,1,99),py:clamp(py,1,99),label:'新标记',tag:'想去',color:'#e74c3c',note:''};
      customPins.push(np);editingPin=np.id;saveState();render();return;
    }
    e.preventDefault();
    if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      lastTouchDist={dist:Math.sqrt(dx*dx+dy*dy),key:key,wrap:wrap};
    } else {
      startDrag(e.touches[0].clientX,e.touches[0].clientY,key,wrap);
    }
  },{passive:false});
  wrap.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(e.touches.length===2&&lastTouchDist&&lastTouchDist.key===key){
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      transforms[key].scale=clamp(transforms[key].scale*(dist/lastTouchDist.dist),1,5);
      transforms[key].x=clamp(transforms[key].x,wrap.offsetWidth*(1-transforms[key].scale),0);
      transforms[key].y=clamp(transforms[key].y,wrap.offsetHeight*(1-transforms[key].scale),0);
      lastTouchDist.dist=dist;applyT(key);
    } else if(e.touches.length===1){
      moveDrag(e.touches[0].clientX,e.touches[0].clientY,key,wrap);
    }
  },{passive:false});
  wrap.addEventListener('touchend',endDrag);
  return wrap;
}

function applyTEl(e,t){e.style.transform='translate('+t.x+'px,'+t.y+'px) scale('+t.scale+')';}
function applyT(key){var e=$('inner-'+key);if(e)applyTEl(e,transforms[key]);}
function startDrag(cx,cy,key,wrap){dragging={key:key,sx:cx-transforms[key].x,sy:cy-transforms[key].y,wrap:wrap};var i=$('inner-'+key);if(i)i.style.cursor='grabbing';}
function moveDrag(cx,cy,key,wrap){
  if(!dragging||dragging.key!==key)return;
  var t=transforms[key];
  if(t.scale<=1){transforms[key].x=0;transforms[key].y=0;}
  else{transforms[key].x=clamp(cx-dragging.sx,wrap.offsetWidth*(1-t.scale),0);transforms[key].y=clamp(cy-dragging.sy,wrap.offsetHeight*(1-t.scale),0);}
  applyT(key);
}
function endDrag(){if(dragging){var i=$('inner-'+dragging.key);if(i)i.style.cursor='grab';}dragging=null;lastTouchDist=null;}

function drawSVG(key,routes,activeRouteId){
  var svg=$('svg-'+key);if(!svg)return;
  var sz=imgSizes[key];
  svg.setAttribute('viewBox','0 0 '+sz.w+' '+sz.h);
  svg.innerHTML='';
  var activeRoute=routes.find(function(r){return r.id===activeRouteId;});
  var display=activeRoute?[activeRoute]:routes;
  var ws=WHITECHAPEL[key];
  var wx=ws.px/100*sz.w,wy=ws.py/100*sz.h;

  // Route lines
  if(activeRoute){
    activeRoute.stops.forEach(function(s,i){
      if(i===0)return;
      var p=activeRoute.stops[i-1];
      svg.appendChild(svgEl('line',{x1:p.px/100*sz.w,y1:p.py/100*sz.h,x2:s.px/100*sz.w,y2:s.py/100*sz.h,stroke:activeRoute.color,'stroke-width':'2','stroke-dasharray':'5,3',opacity:'0.7'}));
    });
  }

  // Transit line to selected stop
  if(activeSid&&ALL_STOPS[activeSid]){
    var si=ALL_STOPS[activeSid];
    var sil=LONDON_IDS.has(si.route.id);
    if((key==='london'&&sil)||(key==='uk'&&!sil)){
      var ss=si.stop;
      svg.appendChild(svgEl('line',{x1:wx,y1:wy,x2:ss.px/100*sz.w,y2:ss.py/100*sz.h,stroke:'#e74c3c','stroke-width':'2','stroke-dasharray':'7,4',opacity:'0.85'}));
    }
  }

  // Home dot
  var hg=document.createElementNS('http://www.w3.org/2000/svg','g');
  hg.appendChild(svgEl('circle',{cx:wx,cy:wy,r:'9',fill:'#e74c3c',stroke:'#fff','stroke-width':'2'}));
  hg.appendChild(svgText(wx,wy+3.5,'⌂','middle','#fff','10','bold'));
  svg.appendChild(hg);

  // Custom pins
  customPins.filter(function(p){return p.key===key;}).forEach(function(pin){
    var x=pin.px/100*sz.w,y=pin.py/100*sz.h;
    var pv=visited.has('pin_'+pin.id);
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    g.appendChild(svgEl('circle',{cx:x,cy:y-4,r:'8',fill:pin.color,stroke:'#fff','stroke-width':'1.5'}));
    g.appendChild(svgEl('polygon',{points:x+','+(y+6)+' '+(x-4)+','+(y-2)+' '+(x+4)+','+(y-2),fill:pin.color}));
    if(pv)g.appendChild(svgText(x,y-1,'✓','middle','#fff','9','bold'));
    var lbl=svgText(x,y-16,pin.label,'middle','#1a0a00','8','700');
    lbl.setAttribute('stroke','rgba(255,252,245,0.95)');lbl.setAttribute('stroke-width','2.5');lbl.setAttribute('paint-order','stroke');
    g.appendChild(lbl);
    (function(pid){g.onclick=function(e){e.stopPropagation();editingPin=editingPin===pid?null:pid;render();};}) (pin.id);
    svg.appendChild(g);
  });

  // Stop dots
  display.forEach(function(route){
    route.stops.forEach(function(s,i){
      var x=s.px/100*sz.w,y=s.py/100*sz.h;
      var done=visited.has(s.id),isActive=activeRouteId===route.id,isSel=activeSid===s.id;
      var r=isActive?9:5;
      var dotR=done&&!isActive?7:r;
      var g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.style.cursor='pointer';
      if(isSel)g.appendChild(svgEl('circle',{cx:x,cy:y,r:dotR+7,fill:route.color,opacity:'0.18'}));
      g.appendChild(svgEl('circle',{cx:x,cy:y,r:dotR+3,fill:route.color,opacity:'0.1'}));
      g.appendChild(svgEl('circle',{cx:x,cy:y,r:dotR,fill:route.color,stroke:'#fff','stroke-width':'1.8',opacity:done||isActive?'1':'0.5'}));
      if(done)g.appendChild(svgText(x,y+3.5,'✓','middle','#fff','8','bold'));
      else if(isActive)g.appendChild(svgText(x,y+3.5,String(i+1),'middle','#fff','7','800'));
      if(isActive){
        var t2=svgText(x,y-dotR-5,s.cn,'middle','#1a0a00','8.5','700');
        t2.setAttribute('stroke','rgba(255,252,245,0.95)');t2.setAttribute('stroke-width','2.5');t2.setAttribute('paint-order','stroke');
        g.appendChild(t2);
      }
      (function(s_,route_){
        g.onclick=function(e){
          e.stopPropagation();
          activeSid=activeSid===s_.id?null:s_.id;
          if(activeSid){activeId=route_.id;page=LONDON_IDS.has(route_.id)?0:1;}
          render();
        };
      })(s,route);
      svg.appendChild(g);
    });
  });
}

function svgEl(tag,attrs){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});return e;}
function svgText(x,y,text,anchor,fill,size,weight){var t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('text-anchor',anchor);t.setAttribute('fill',fill);t.setAttribute('font-size',size);t.setAttribute('font-weight',weight);t.textContent=text;return t;}

function toggleVisit(sid){if(visited.has(sid))visited.delete(sid);else visited.add(sid);saveState();render();}

function makeRouteCard(route){
  var doneCount=route.stops.filter(function(s){return visited.has(s.id);}).length;
  var card=div('background:#fffdf7;border-radius:12px;border:1px solid #d4c8b0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)');
  card.innerHTML='<div style="height:3px;background:linear-gradient(90deg,'+route.color+','+route.color+'99)"></div>';
  var body=div('padding:10px 12px');

    '<span style="font-size:10px;background:'+route.color+'18;color:'+route.color+';padding:2px 8px;border-radius:99px;font-weight:700">'+doneCount+'/'+route.stops.length+' 已打卡</span>';

    var row=div('display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;background:'+(isOpen?route.color+'0c':'transparent'));

      '<div style="font-size:10px;color:#7a6a5a;margin-top:1px">'+s.en+' · '+s.visit.replace('建议预留','')+'</div>';

    row.appendChild(num);row.appendChild(info);row.appendChild(arr);
    (function(s_,sid){
      num.onclick=function(e){e.stopPropagation();toggleVisit(sid);};

      var hbox=div('flex:1;background:#e8f4fd;border-radius:8px;padding:6px 8px;border-left:3px solid #2471a3');
      hbox.innerHTML='<div style="font-size:9px;font-weight:700;color:#2471a3;margin-bottom:2px">🕐 开放时间</div><div style="font-size:10px;color:#1a0a00;line-height:1.45">'+s.hours+'</div>';

      hv.appendChild(hbox);hv.appendChild(vb);content.appendChild(hv);

      if(s.notes){
        var nb=div('background:#fff8e1;border-radius:8px;padding:7px 9px;margin-bottom:6px;border-left:3px solid #f0a500');
        nb.innerHTML='<div style="font-size:9px;font-weight:700;color:#856404;margin-bottom:3px">⚠️ 注意事项</div>'+
          '<div style="font-size:10px;color:#1a0a00;line-height:1.5">'+s.notes.replace('⚠️ ','')+'</div>';
        content.appendChild(nb);
      }
      // What
      var wb=div('background:#f5f0e8;border-radius:8px;padding:7px 9px;margin-bottom:6px');
      wb.innerHTML='<div style="font-size:9px;font-weight:700;color:#7a6a5a;margin-bottom:3px">📝 游览建议</div>'+
        '<div style="font-size:11px;color:#1a0a00;line-height:1.6">'+s.what+'</div>';
      content.appendChild(wb);
      // Checkin spots
      if(s.checkin_spots&&s.checkin_spots.length){
        var cs=div('background:#fff8f0;border-radius:8px;padding:7px 9px;margin-bottom:6px;border-left:3px solid #e67e22');
        var csh='<div style="font-size:9px;font-weight:700;color:#e67e22;margin-bottom:5px">⭐ 必打卡</div>';
        s.checkin_spots.forEach(function(spot){csh+='<div style="font-size:11px;color:#1a0a00;padding:3px 0;border-bottom:1px solid #f0e8e0">'+spot+'</div>';});
        cs.innerHTML=csh;content.appendChild(cs);
      }
      // Checkin button
      var vb2=el('button','width:100%;padding:10px;border-radius:8px;border:none;margin-top:4px;background:#1a0a00;color:'+(done?'#888':'#fff')+';font-size:13px;font-weight:700;font-family:inherit;cursor:pointer',done?'✓ 已打卡':'标记已打卡');
      (function(sid){vb2.onclick=function(){toggleVisit(sid);};}) (s.id);
      content.appendChild(vb2);
      item.appendChild(content);
    }
    body.appendChild(item);
  });
  card.appendChild(body);
  return card;
}

function makePinModal(pin){
  var ov=div('position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center');
  var m=div('background:#fffdf7;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px');
  m.appendChild(div('font-size:14px;font-weight:800;color:#1a0a00;margin-bottom:12px;text-align:center','✏️ 编辑标记'));
  m.appendChild(div('font-size:11px;font-weight:700;color:#7a6a5a;margin-bottom:4px','标记名称'));
  var inp=el('input','width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #d4c8b0;font-size:13px;font-family:inherit;background:#f5f0e8;margin-bottom:10px;outline:none');
  inp.value=pin.label;m.appendChild(inp);
  m.appendChild(div('font-size:11px;font-weight:700;color:#7a6a5a;margin-bottom:4px','备注'));
  var note=el('textarea','width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #d4c8b0;font-size:12px;font-family:inherit;background:#f5f0e8;margin-bottom:10px;outline:none;resize:none;height:56px');
  note.value=pin.note||'';m.appendChild(note);
  m.appendChild(div('font-size:11px;font-weight:700;color:#7a6a5a;margin-bottom:6px','标签'));
  var tgs=div('display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px');
  CUSTOM_TAGS.forEach(function(t){
    var sel=pin.tag===t.label;
    var tb=el('button','padding:5px 12px;border-radius:99px;border:1.5px solid '+t.color+';background:'+(sel?t.color:'transparent')+';color:'+(sel?'#fff':t.color)+';font-size:12px;font-weight:700;font-family:inherit;cursor:pointer',t.label);
    tb.onclick=function(){pin.tag=t.label;pin.color=t.color;tgs.querySelectorAll('button').forEach(function(b){b.style.background='transparent';b.style.color=b.dataset.c;});tb.style.background=t.color;tb.style.color='#fff';};
    tb.dataset.c=t.color;tgs.appendChild(tb);
  });
  m.appendChild(tgs);
  var btns=div('display:flex;gap:8px');
  var cancel=el('button','flex:1;padding:10px;border-radius:10px;border:1.5px solid #d4c8b0;background:transparent;color:#7a6a5a;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer','取消');
  cancel.onclick=function(){editingPin=null;render();};
  var save=el('button','flex:2;padding:10px;border-radius:10px;border:none;background:#1a0a00;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer','保存');
  save.onclick=function(){pin.label=inp.value||'新标记';pin.note=note.value;editingPin=null;saveState();render();};
  btns.appendChild(cancel);btns.appendChild(save);m.appendChild(btns);
  ov.appendChild(m);
  ov.onclick=function(e){if(e.target===ov){editingPin=null;render();}};
  return ov;
}

window.onload=function(){loadState();render();};

</script>
</body>
